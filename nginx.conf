worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream backend { server backend:8000; }
    upstream app-backoffice { server app-backoffice:80; }
    upstream app-caisse { server app-caisse:80; }
    upstream app-stock { server app-stock:80; }

    # Map WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Common proxy settings for API
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Port 80: Backoffice
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://app-backoffice;
        }
        location /api/ {
            proxy_pass http://backend;
        }
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /static/ {
            alias /usr/share/nginx/html/static/;
        }
        location /media/ {
            alias /usr/share/nginx/html/media/;
        }
    }

    # Port 81: Caisse
    server {
        listen 81;
        server_name _;

        location / {
            proxy_pass http://app-caisse;
        }
        location /api/ {
            proxy_pass http://backend;
        }
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /static/ {
            alias /usr/share/nginx/html/static/;
        }
        location /media/ {
            alias /usr/share/nginx/html/media/;
        }
    }

    # Port 82: Stock
    server {
        listen 82;
        server_name _;

        location / {
            proxy_pass http://app-stock;
        }
        location /api/ {
            proxy_pass http://backend;
        }
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /static/ {
            alias /usr/share/nginx/html/static/;
        }
        location /media/ {
            alias /usr/share/nginx/html/media/;
        }
    }
}
