version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dutyfree}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: >
      sh -c "sleep 5 && python manage.py collectstatic --noinput && python manage.py migrate && daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-dutyfree-secret-prod-123}
      - POSTGRES_DB=${POSTGRES_DB:-dutyfree}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DJANGO_SETTINGS_MODULE=backend.settings
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  app-backoffice:
    build:
      context: ./app-backoffice
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=/ws
    restart: unless-stopped

  app-caisse:
    build:
      context: ./app-caisse
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=/ws
    restart: unless-stopped

  app-stock:
    build:
      context: ./app-stock
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=/ws
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"     # Backoffice
      - "81:81"     # Caisse
      - "82:82"     # Stock
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/usr/share/nginx/html/static:ro
      - backend_media:/usr/share/nginx/html/media:ro
    depends_on:
      - backend
      - app-backoffice
      - app-caisse
      - app-stock
    restart: unless-stopped

volumes:
  postgres_data:
  backend_static:
  backend_media:
